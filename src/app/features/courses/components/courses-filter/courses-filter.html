<aside class="sidebar">
  <div class="filterSection">
    <h3>Categories</h3>
    <div class="filterItems">
      @for (category of categories(); track category.id) {
        <button
          class="filterItem"
          [class.selected]="selectedCategories().includes(category.id)"
          (click)="categoryToggled.emit(category.id)"
          [disabled]="isLoading()"
        >
          <input
            type="checkbox"
            [checked]="selectedCategories().includes(category.id)"
            tabindex="-1"
          />
          {{ category.name }}
        </button>
      }
    </div>
  </div>

  <div class="filterSection">
    <h3>Topics</h3>
    <div class="filterItems">
      @for (topic of topics(); track topic.id) {
        <button
          class="filterItem"
          [class.selected]="selectedTopics().includes(topic.id)"
          (click)="topicToggled.emit(topic.id)"
          [disabled]="isLoading()"
        >
          <input type="checkbox" [checked]="selectedTopics().includes(topic.id)" tabindex="-1" />
          {{ topic.name }}
        </button>
      }
    </div>
  </div>

  <div class="filterSection">
    <h3>Instructors</h3>
    <div class="filterItems">
      @for (instructor of instructors(); track instructor.id) {
        <button
          class="filterItem"
          [class.selected]="selectedInstructors().includes(instructor.id)"
          (click)="instructorToggled.emit(instructor.id)"
          [disabled]="isLoading()"
        >
          <input
            type="checkbox"
            [checked]="selectedInstructors().includes(instructor.id)"
            tabindex="-1"
          />
          @if (instructor.avatar) {
            <img [src]="instructor.avatar" [alt]="instructor.name" />
          }
          {{ instructor.name }}
        </button>
      }
    </div>
  </div>

  <div class="sidebarFooter">
    @if (activeFiltersCount() > 0) {
      <p>{{ activeFiltersCount() }} filters active</p>
    }
    <button (click)="filtersCleared.emit()" [disabled]="activeFiltersCount() === 0 || isLoading()">
      Clear All Filters
    </button>
  </div>
</aside>
